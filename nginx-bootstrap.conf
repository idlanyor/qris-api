server {
    listen 80;
    listen [::]:80;
    server_name qr.ireng.uk;

    # Allow Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Temporary: don't redirect yet so we can verify the challenge
    location / {
        proxy_pass http://localhost:3111;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
